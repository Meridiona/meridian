name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SQLX_OFFLINE: "true"

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      # The tray pulls screenpipe-screen/-a11y from the PRIVATE Meridiona/
      # screenpipe-fork (a git dep). They are optional/capture-gated, but cargo
      # still RESOLVES them for the workspace (fmt/clippy/test), so it must fetch
      # the source. Force the git CLI so cargo honors the url.insteadOf rewrite
      # the auth step installs — libgit2 would not pick it up.
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate git for the private screenpipe-fork dependency
        # checkout's persist-credentials and the default GITHUB_TOKEN are both
        # scoped to THIS repo, so cargo's `git fetch` of the fork 403s. Rewrite
        # just that URL to embed a PAT with read access. REQUIRES the GH_TOKEN
        # secret to read Meridiona/screenpipe-fork (org-member classic PAT with
        # `repo`, or a fine-grained PAT granting both meridian AND screenpipe-fork).
        # Same secret + mechanism as release.yml / release-staging.yml.
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/Meridiona/screenpipe-fork".insteadOf \
            "https://github.com/Meridiona/screenpipe-fork"

      - name: Install Rust 1.93.1
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: test
        run: cargo test

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ui/.next/cache
          key: nextjs-${{ hashFiles('ui/package-lock.json') }}-${{ hashFiles('ui/**/*.ts', 'ui/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ hashFiles('ui/package-lock.json') }}-
            nextjs-

      - name: UI install
        run: npm ci
        working-directory: ui

      - name: UI build
        run: npm run build
        working-directory: ui

  # Shipped migrations are immutable: sqlx records a checksum of every applied
  # migration and the daemon refuses to start if a migration file later differs.
  # A pre-commit hook also guards this, but hooks are opt-in and bypassable, so
  # enforce it server-side where it cannot be skipped.
  migration-guard:
    name: Migrations append-only
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject modified, renamed, or deleted migrations
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          violations=$(git diff --name-status "$base"...HEAD -- src/migrations \
            | grep -E '^(M|D|R)' || true)
          if [ -n "$violations" ]; then
            echo "::error::Shipped migrations are immutable. Add a NEW numbered migration in src/migrations/ — never modify, rename, or delete an existing one (it changes the sqlx checksum and breaks every database that already applied it)."
            echo "Offending changes:"
            echo "$violations"
            exit 1
          fi
          echo "OK — no existing migrations were modified, renamed, or deleted."

  # screenpipe relicensed MIT → Commercial on 2026-06-10. 0.4.6 (2026-06-05) is
  # the last MIT npm release; >= 0.4.17 is Commercial (its "competing product"
  # clause would then bind our users). Meridian ships zero screenpipe code, so
  # staying on MIT 0.4.6 keeps the install license-clean. Enforce the pin
  # server-side so it can't silently drift across the relicense boundary.
  screenpipe-license-pin:
    name: screenpipe MIT pin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert SCREENPIPE_VERSION stays on the last MIT release (0.4.6)
        run: |
          expected="0.4.6"
          fail=0
          # install.sh no longer installs screenpipe (capture is in-process in
          # the tray since v1.64.0). install-from-bundle.sh still uses it for
          # the legacy npm-based install path — the pin must stay there.
          for f in scripts/install-from-bundle.sh; do
            v=$(grep -E '^SCREENPIPE_VERSION=' "$f" | head -1 | cut -d'"' -f2)
            if [ "$v" != "$expected" ]; then
              echo "::error file=$f::SCREENPIPE_VERSION='$v' but must be '$expected' — the last MIT npm release. screenpipe >= 0.4.17 is Commercial-licensed; bumping the pin ships users a commercial dependency. Changing this requires legal review (and editing this guard). See the LICENSE PIN comment at the pin."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "OK — screenpipe pinned to the last MIT release ($expected)."
