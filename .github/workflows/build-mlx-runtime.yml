name: Build MLX runtime

# Builds the self-contained MLX runtime tarball for Approach C
# (download-and-provision): a python-build-standalone CPython + the MLX venv +
# the agents package, packed for download into ~/.meridian/runtime/ on first run.
# The customer machine needs no system Python/Node/uv — only Apple Silicon +
# macOS >= the floor in the manifest. The ~7 GB model is NOT bundled (downloaded
# on first request).
#
# build (macos-14, arm64) → smoke (macos-{14,15,26}, arm64 — DIFFERENT machines/OS,
# so relocation + ABI + deployment-target are exercised on boxes that didn't build
# it) → publish (only on a `runtime-v*` tag) force-updates the rolling
# `runtime-latest` GitHub release with the tarball + manifest. workflow_dispatch
# builds + smoke-tests without publishing.
#
# The app pins the `runtime-latest` release's runtime-manifest.json
# (RUNTIME_MANIFEST_URL in mlx_server.rs) — a STABLE url so a shipped build keeps
# discovering newer runtimes without an app update. We don't use GitHub's
# /releases/latest/ because that resolves to the app's semantic-release (no runtime
# manifest). So both the manifest url AND the tarball url it embeds are
# runtime-latest urls (RUNTIME_TAG=runtime-latest at build time).
#
# To cut a runtime release:
#   git tag runtime-v$(grep -m1 '^version' services/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
#   git push origin <that tag>
# → builds, smoke-tests across macOS versions, republishes runtime-latest.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Runtime version label (defaults to services/pyproject.toml)"
        required: false
        default: ""
  push:
    tags: ["runtime-v*"]

permissions:
  contents: write   # publish job attaches assets to the release

concurrency:
  group: mlx-runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macos-14 arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build runtime tarball
        env:
          VERSION: ${{ github.event.inputs.version }}
          # Stamp the STABLE rolling-release URL into the manifest's tarball url,
          # so the app (which pins runtime-latest) fetches a runtime-latest tarball
          # — not a version-pinned one that would freeze it to a single runtime.
          RUNTIME_TAG: runtime-latest
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/build-mlx-runtime.sh

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlx-runtime
          path: |
            dist/meridian-mlx-runtime-*-aarch64.tar.gz
            dist/runtime-manifest.json
          if-no-files-found: error
          retention-days: 7

  smoke:
    name: Smoke test (${{ matrix.os }})
    needs: build
    # Run on every hosted arm64 macOS version so a deployment-target / ABI /
    # relocation regression is caught across the supported range — and on boxes
    # that did NOT build the tarball (build is macos-14). macos-13 is Intel, so
    # the 13.5 manifest floor itself can't be exercised on hosted runners;
    # macos-14 (Sonoma) is the closest available. fail-fast off so one version
    # failing still reports the others.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: mlx-runtime
          path: dist

      - name: Smoke test on a fresh extraction
        run: bash scripts/smoke-test-mlx-runtime.sh dist/meridian-mlx-runtime-*-aarch64.tar.gz

  publish:
    name: Publish runtime-latest
    needs: smoke
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: mlx-runtime
          path: dist

      - name: Force-update the rolling runtime-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The app pins runtime-latest's runtime-manifest.json (RUNTIME_MANIFEST_URL).
          # Create the rolling release once (prerelease, so it never competes with
          # the app's semantic-release for the "Latest" slot), then clobber its
          # assets on every runtime build. The triggering runtime-v* git tag is the
          # version record; the version itself also lives inside the manifest.
          gh release view runtime-latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create runtime-latest \
                 --repo "${GITHUB_REPOSITORY}" \
                 --title "MLX runtime (latest)" \
                 --prerelease \
                 --notes "Rolling latest self-contained MLX runtime. Auto-updated by build-mlx-runtime.yml on every runtime-v* tag; the app pins this release's runtime-manifest.json."
          gh release upload runtime-latest \
            dist/meridian-mlx-runtime-*-aarch64.tar.gz \
            dist/runtime-manifest.json \
            --clobber --repo "${GITHUB_REPOSITORY}"
