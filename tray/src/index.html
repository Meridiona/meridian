<!doctype html>
<!-- ambient dev tool that watches what you do and updates your PM tickets automatically, boosting developer productivity -->
<!-- Rebuilt from the Claude Design mock "Meridian Tray.dc.html"
     (claude.ai/design/p/b8656e29-ae04-4f69-b17f-d5fab4d00f3a). -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meridian</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pop" id="pop">
    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <header class="pop-head">
      <span class="brand-mark" id="brand-mark" aria-hidden="true"></span>
      <div class="head-text">
        <div class="wordmark">Meridian</div>
        <div class="head-sub" id="head-sub">Connecting…</div>
      </div>
      <button class="open-btn" id="btn-open-head">Open</button>
    </header>

    <!-- ── Update available (DMG auto-update; hidden until check_update finds one) ─ -->
    <button class="upd" id="upd" hidden>
      <span class="upd-left">
        <span class="upd-icon" aria-hidden="true">↑</span>
        <span class="upd-text" id="upd-text">Update available</span>
      </span>
      <span class="upd-ver" id="upd-ver"></span>
    </button>

    <!-- ── Capture status + pause ─────────────────────────────────────────── -->
    <section class="status-card" id="status-card">
      <div class="status-top">
        <span class="status-dot" id="status-dot"></span>
        <div class="status-text">
          <p class="status-title" id="status-title">Connecting…</p>
          <p class="status-sub" id="status-sub"></p>
        </div>
        <span class="status-kbd">⌥⌘P</span>
      </div>

      <button class="primary-btn" id="primary-btn">Pause capture</button>

      <!-- pause duration options — shown when "Pause capture" is clicked -->
      <div class="pause-options" id="pause-options" hidden>
        <button class="opt-btn" id="opt-15m">
          <span class="opt-label">Pause for 15 minutes</span>
          <span class="opt-hint" id="opt-15m-hint"></span>
        </button>
        <button class="opt-btn" id="opt-1h">
          <span class="opt-label">Pause for 1 hour</span>
          <span class="opt-hint" id="opt-1h-hint"></span>
        </button>
        <button class="opt-btn" id="opt-tomorrow">
          <span class="opt-label">Pause until tomorrow</span>
          <span class="opt-hint" id="opt-tomorrow-hint"></span>
        </button>
        <button class="opt-btn" id="opt-indefinite">
          <span class="opt-label">Pause indefinitely</span>
          <span class="opt-hint">until I resume</span>
        </button>
      </div>

      <!-- active countdown (timed pause only) -->
      <div class="pause-active" id="pause-active" hidden>
        <span class="pause-countdown" id="pause-countdown">--:--</span>
        <button class="resume-btn" id="resume-btn">Resume now</button>
      </div>
    </section>

    <!-- ── TODAY ──────────────────────────────────────────────────────────── -->
    <section class="today">
      <div class="today-head">
        <span class="kicker">TODAY</span>
        <span class="today-rule"></span>
      </div>

      <div class="today-grid">
        <div class="stat">
          <div class="stat-value stat-logged" id="stat-logged">0m</div>
          <div class="stat-label">Logged</div>
        </div>
        <div class="stat">
          <div class="stat-value stat-focus" id="stat-focus">0m</div>
          <div class="stat-label">Focus</div>
        </div>
        <div class="stat">
          <div class="stat-value stat-drafts" id="stat-drafts">0</div>
          <div class="stat-label">Drafts</div>
        </div>
      </div>

      <!-- review CTA (conditional on real drafts) -->
      <button class="review-cta" id="review-cta" hidden>
        <span class="review-count" id="review-count">0</span>
        <span class="review-text">drafts ready to review</span>
        <span class="review-arrow">→</span>
      </button>
    </section>

    <!-- ── Privacy reassurance ────────────────────────────────────────────── -->
    <div class="privacy-line">
      <svg width="13" height="15" viewBox="0 0 13 15" fill="none" aria-hidden="true">
        <path d="M6.5 1 L12 3.2 V7 C12 10.5 9.5 12.8 6.5 14 C3.5 12.8 1 10.5 1 7 V3.2 Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M4.4 7.3 L5.9 8.8 L8.7 5.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>100% on-device — nothing leaves your Mac until you approve it</span>
    </div>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <footer class="pop-foot">
      <button class="foot-btn" id="btn-open">Dashboard</button>
      <span class="foot-sep"></span>
      <button class="foot-btn" id="btn-perms">Preferences</button>
      <span class="foot-sep"></span>
      <button class="foot-btn foot-quit" id="btn-quit">Quit</button>
    </footer>
  </div>

  <script src="pause-utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
