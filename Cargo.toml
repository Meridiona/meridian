[package]
name = "meridian"
version = "0.1.0"
edition = "2021"
description = "Meridian — normalises screenpipe activity into structured app sessions"
authors = ["Meridiona"]
repository = "https://github.com/meridiona/meridian"
license = "MIT"
keywords = ["screenpipe", "productivity", "activity-tracking"]

[lib]
name = "meridian"
path = "src/lib.rs"

[[bin]]
name = "meridian"
path = "src/main.rs"

[dependencies]
# DB — exact versions matching screenpipe
sqlx = { version = "0.7", features = ["sqlite", "runtime-tokio-rustls", "chrono", "migrate", "json"] }
libsqlite3-sys = { version = "0.26", features = ["bundled"] }
sqlite-vec = "0.1.3"

# Async
tokio = { version = "1.15", features = ["full"] }
futures = "0.3.31"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Time
chrono = { version = "0.4.31", features = ["serde"] }

# Logging
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.19", features = ["env-filter", "chrono"] }

# Error handling
anyhow = "1.0.86"

# Misc
once_cell = "1.19"

[dev-dependencies]
tokio = { version = "1.15", features = ["full", "test-util"] }
