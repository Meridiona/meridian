# meridian — hermes AIAgent configuration
# Generated from hermes-config/config.yaml by scripts/setup-hermes.sh
# Do NOT edit .hermes/config.yaml directly — edit this template and re-run setup.

model:
  provider: ollama-cloud
  default: gemma4:31b
  base_url: https://ollama.com/v1

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375

skills:
  external_dirs:
    - __SKILLS_DIR__

agent:
  max_turns: 5
  api_max_retries: 2
  reasoning_effort: medium

context:
  engine: compressor

compression:
  enabled: true
  threshold: 0.7
  target_ratio: 0.3
  protect_last_n: 10
